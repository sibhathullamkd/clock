<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20+ Aesthetic Time Screensavers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&family=JetBrains+Mono:wght@100;400&family=Playfair+Display:ital,wght@0,400;1,700&family=Orbitron:wght@400;900&family=Bebas+Neue&family=Space+Grotesk:wght@300;700&family=Syne:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #3b82f6;
            --bg: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--primary);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            transition: background 1s ease, color 1s ease;
        }

        /* --- Transitions --- */
        .fade-enter { opacity: 0; transform: scale(0.95); }
        .fade-active { opacity: 1; transform: scale(1); transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); }

        /* --- Layout --- */
        #stage {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* --- Navigation --- */
        .nav-btn {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 2rem 1rem; cursor: pointer;
            z-index: 100; transition: all 0.3s; opacity: 0;
            backdrop-filter: blur(10px);
        }
        body:hover .nav-btn { opacity: 1; }
        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        .nav-left { left: 0; border-radius: 0 1rem 1rem 0; }
        .nav-right { right: 0; border-radius: 1rem 0 0 1rem; }

        .ui-panel {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            z-index: 101; opacity: 0; transition: opacity 0.5s;
        }
        body:hover .ui-panel { opacity: 1; }

        /* --- Analog Clock Bases --- */
        .analog-face {
            width: 350px; height: 350px;
            border-radius: 50%; border: 2px solid currentColor;
            position: relative;
        }
        .hand {
            position: absolute; bottom: 50%; left: 50%;
            transform-origin: bottom; border-radius: 10px;
            background: currentColor;
        }

        /* --- Specific Theme Styles --- */
        .glitch { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 10px; }
        .brutal { font-family: 'Syne'; font-weight: 800; text-transform: uppercase; }
        .zen { font-family: 'Inter'; font-weight: 100; letter-spacing: 20px; }
        .mono { font-family: 'JetBrains Mono'; font-weight: 100; }
        
        /* Particle Background */
        #canvas-bg {
            position: absolute; top: 0; left: 0; z-index: -1;
        }

        /* --- Theme Colors --- */
        .theme-crimson { --bg: #1a0505; --primary: #ff4d4d; }
        .theme-emerald { --bg: #051a0d; --primary: #4dff88; }
        .theme-midnight { --bg: #020617; --primary: #60a5fa; }
        .theme-gold { --bg: #0f0b01; --primary: #fbbf24; }
        .theme-clay { --bg: #1e1b1e; --primary: #d8b4fe; }
        .theme-paper { --bg: #f5f5f5; --primary: #1a1a1a; }

        .cursor-hide { cursor: none; }
    </style>
</head>
<body id="app">

    <canvas id="canvas-bg"></canvas>

    <button class="nav-btn nav-left" onclick="prevTheme()">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    
    <button class="nav-btn nav-right" onclick="nextTheme()">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <div id="stage">
        <!-- Content injected by JS -->
    </div>

    <div class="ui-panel flex items-center gap-4 bg-black/40 p-3 rounded-full border border-white/10 backdrop-blur-md">
        <span id="theme-index" class="text-xs font-mono opacity-50 px-3">01 / 25</span>
        <div class="h-4 w-px bg-white/20"></div>
        <button onclick="toggleFullscreen()" class="p-2 hover:bg-white/10 rounded-full transition">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
    </div>

    <script>
        const themes = [
            { id: 'minimal-focus', name: 'Minimal Focus', class: 'zen', type: 'digital' },
            { id: 'cyberpunk', name: 'Cyberpunk Red', class: 'theme-crimson glitch', type: 'digital' },
            { id: 'matrix', name: 'Matrix Rain', class: 'theme-emerald mono', type: 'digital' },
            { id: 'classic-swiss', name: 'Classic Swiss', class: 'theme-paper', type: 'analog' },
            { id: 'brutalist', name: 'Brutalist Extra', class: 'brutal', type: 'digital' },
            { id: 'stardust', name: 'Midnight Stardust', class: 'theme-midnight', type: 'digital', animated: true },
            { id: 'gold-luxury', name: 'Gold Leaf', class: 'theme-gold', type: 'analog' },
            { id: 'typewriter', name: 'Poet Style', class: 'theme-paper mono', type: 'text' },
            { id: 'vaporwave', name: 'Vapor Neon', class: 'theme-clay', type: 'digital' },
            { id: 'bauhaus', name: 'Bauhaus Geometry', class: 'theme-paper', type: 'bauhaus' },
            { id: 'big-hour', name: 'Hour Focus', class: 'theme-midnight', type: 'huge' },
            { id: 'vertical', name: 'Vertical Flow', class: 'theme-crimson', type: 'vertical' },
            { id: 'blueprint', name: 'Architect Blueprint', class: 'theme-midnight mono', type: 'digital' },
            { id: 'bold-italics', name: 'Dynamic Speed', class: 'theme-emerald', type: 'italics' },
            { id: 'roman', name: 'Ancient Roman', class: 'theme-gold', type: 'analog-roman' },
            { id: 'soft-glow', name: 'Aura Glow', class: 'theme-clay', type: 'glow' },
            { id: 'dotted', name: 'Led Dot Matrix', class: 'theme-emerald mono', type: 'dots' },
            { id: 'serene', name: 'Serene Serif', class: 'theme-paper', type: 'digital-serif' },
            { id: 'deep-space', name: 'Void Pulse', class: 'theme-midnight', type: 'pulse' },
            { id: 'gradient-text', name: 'Liquid Color', class: '', type: 'gradient' },
            { id: 'split-flap', name: 'Airport Board', class: 'mono', type: 'digital' },
            { id: 'bubble', name: 'Bubble Time', class: 'theme-clay', type: 'digital' },
            { id: 'hacker', name: 'Kernel Debug', class: 'theme-emerald mono', type: 'hacker' }
        ];

        let currentIdx = 0;
        const stage = document.getElementById('stage');
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        function createParticles() {
            particles = [];
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2
                });
            }
        }
        createParticles();

        function animateParticles() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            const theme = themes[currentIdx];
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--primary');
            ctx.globalAlpha = 0.3;
            
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0) p.x = canvas.width;
                if(p.x > canvas.width) p.x = 0;
                if(p.y < 0) p.y = canvas.height;
                if(p.y > canvas.height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        function updateClock() {
            const now = new Date();
            const timeOptions = { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const dateOptions = { timeZone: 'Asia/Kolkata', weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            
            const timeStr = now.toLocaleTimeString('en-IN', timeOptions);
            const dateStr = now.toLocaleDateString('en-IN', dateOptions);
            
            const theme = themes[currentIdx];
            const content = document.getElementById('clock-content');
            if(!content) return;

            // Handle Analog Logic
            if (theme.type.includes('analog')) {
                const s = now.getSeconds();
                const m = now.getMinutes();
                const h = now.getHours();
                const sHand = document.getElementById('hand-sec');
                const mHand = document.getElementById('hand-min');
                const hHand = document.getElementById('hand-hour');
                if(sHand) sHand.style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
                if(mHand) mHand.style.transform = `translateX(-50%) rotate(${m * 6 + s * 0.1}deg)`;
                if(hHand) hHand.style.transform = `translateX(-50%) rotate(${h * 30 + m * 0.5}deg)`;
            } else if (theme.type === 'huge') {
                document.getElementById('display-h').textContent = now.getHours().toString().padStart(2, '0');
                document.getElementById('display-m').textContent = now.getMinutes().toString().padStart(2, '0');
            } else if (theme.type === 'vertical') {
                document.getElementById('v-h').textContent = now.getHours().toString().padStart(2, '0');
                document.getElementById('v-m').textContent = now.getMinutes().toString().padStart(2, '0');
                document.getElementById('v-s').textContent = now.getSeconds().toString().padStart(2, '0');
            } else {
                const timeEl = document.getElementById('time-main');
                if(timeEl) timeEl.textContent = timeStr;
            }
            
            const dateEl = document.getElementById('date-main');
            if(dateEl) dateEl.textContent = dateStr;
        }

        function renderTheme() {
            const theme = themes[currentIdx];
            document.body.className = theme.class;
            document.getElementById('theme-index').textContent = `${(currentIdx + 1).toString().padStart(2, '0')} / ${themes.length}`;
            
            let html = `<div id="clock-content" class="fade-enter text-center">`;
            
            if (theme.type === 'analog' || theme.type === 'analog-roman') {
                html += `
                    <div class="analog-face mx-auto mb-8">
                        ${[...Array(12)].map((_, i) => `<div style="position:absolute; width:100%; height:100%; text-align:center; transform:rotate(${i*30}deg); padding:10px; font-weight:bold">${theme.type.includes('roman') ? ['XII','I','II','III','IV','V','VI','VII','VIII','IX','X','XI'][i] : (i==0?12:i)}</div>`).join('')}
                        <div id="hand-hour" class="hand w-2 h-24" style="z-index:3"></div>
                        <div id="hand-min" class="hand w-1 h-32" style="z-index:2"></div>
                        <div id="hand-sec" class="hand w-0.5 h-36 bg-red-500" style="z-index:1"></div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 bg-current rounded-full"></div>
                    </div>
                    <div id="date-main" class="text-lg opacity-50 tracking-widest uppercase"></div>
                `;
            } else if (theme.type === 'huge') {
                html += `
                    <div class="flex flex-col items-center">
                        <div id="display-h" class="text-[25vw] font-black leading-none opacity-10">00</div>
                        <div id="display-m" class="text-[25vw] font-black leading-none -mt-[5vw]">00</div>
                        <div id="date-main" class="mt-4 text-xl tracking-tighter"></div>
                    </div>
                `;
            } else if (theme.type === 'vertical') {
                html += `
                    <div class="flex flex-col text-[12vh] font-bold leading-none">
                        <span id="v-h">00</span><span id="v-m">00</span><span id="v-s" class="opacity-30">00</span>
                    </div>
                    <div id="date-main" class="mt-8 vertical-text text-sm opacity-50 [writing-mode:vertical-rl]"></div>
                `;
            } else if (theme.type === 'hacker') {
                html += `
                    <div class="text-left text-sm opacity-80 border-l-2 border-current pl-4">
                        <div>> SYSTEM_TIME_FETCH_SUCCESS</div>
                        <div>> LOCATION: KARAKURUSSI_KERALA</div>
                        <div class="text-6xl my-4" id="time-main">00:00:00</div>
                        <div id="date-main"></div>
                        <div class="animate-pulse">_</div>
                    </div>
                `;
            } else {
                html += `
                    <div id="time-main" class="text-[12vw] leading-none mb-4 whitespace-nowrap">00:00:00</div>
                    <div id="date-main" class="text-xl opacity-60 tracking-[0.3em]"></div>
                `;
            }

            html += `<div class="mt-12 text-[10px] opacity-30 uppercase tracking-[0.5em]">Karakurussi, Kerala, India</div>`;
            html += `</div>`;
            
            stage.innerHTML = html;
            
            setTimeout(() => {
                document.getElementById('clock-content').classList.add('fade-active');
            }, 50);
            
            updateClock();
        }

        function nextTheme() {
            currentIdx = (currentIdx + 1) % themes.length;
            renderTheme();
        }

        function prevTheme() {
            currentIdx = (currentIdx - 1 + themes.length) % themes.length;
            renderTheme();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        // Hide UI on inactivity
        let idleTimer;
        document.addEventListener('mousemove', () => {
            document.body.classList.remove('cursor-hide');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                document.body.classList.add('cursor-hide');
            }, 4000);
        });

        // Key listeners
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight') nextTheme();
            if(e.key === 'ArrowLeft') prevTheme();
        });

        setInterval(updateClock, 1000);
        renderTheme();
    </script>
</body>
</html>
