<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Time Screensavers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@300;500&family=Playfair+Display:ital,wght@0,400;1,700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .screensaver-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Theme: Neon Cyber */
        .theme-cyber {
            --accent-color: #00f2ff;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5), 0 0 40px rgba(0, 242, 255, 0.2);
        }

        /* Theme: Minimalist */
        .theme-minimal {
            --accent-color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            letter-spacing: -0.05em;
        }

        /* Theme: Retro Console */
        .theme-retro {
            --accent-color: #4ade80;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Theme: Elegant Serif */
        .theme-elegant {
            --accent-color: #fde68a;
            font-family: 'Playfair Display', serif;
        }

        /* Theme: Aurora */
        .theme-aurora {
            background: linear-gradient(45deg, #0f172a, #1e1b4b, #312e81);
            --accent-color: #e0e7ff;
            font-family: 'Inter', sans-serif;
        }

        .clock-wrapper {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .time-display {
            font-size: clamp(4rem, 15vw, 12rem);
            line-height: 1;
            margin-bottom: 1rem;
        }

        .date-display {
            font-size: clamp(1rem, 3vw, 2rem);
            opacity: 0.8;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .location-tag {
            margin-top: 2rem;
            font-size: 0.875rem;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            display: flex;
            gap: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            transition: opacity 0.3s;
        }

        .controls:hover {
            opacity: 1;
        }

        .theme-btn {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.2);
        }

        .cursor-hide {
            cursor: none;
        }

        .glow-effect {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.1;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            transition: all 1s;
        }
    </style>
</head>
<body class="theme-minimal" id="body">

    <div class="glow-effect" id="glow"></div>

    <div class="screensaver-container" id="container">
        <div class="clock-wrapper">
            <div id="time" class="time-display">00:00:00</div>
            <div id="date" class="date-display">Tuesday, 21 April 2026</div>
            <div class="location-tag">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                Karakurussi, Kerala • IST
            </div>
        </div>
    </div>

    <div class="controls" id="controls">
        <button onclick="setTheme('theme-minimal')" class="theme-btn bg-white" title="Minimal"></button>
        <button onclick="setTheme('theme-cyber')" class="theme-btn bg-cyan-400" title="Cyberpunk"></button>
        <button onclick="setTheme('theme-retro')" class="theme-btn bg-green-500" title="Retro"></button>
        <button onclick="setTheme('theme-elegant')" class="theme-btn bg-amber-200" title="Elegant"></button>
        <button onclick="setTheme('theme-aurora')" class="theme-btn bg-indigo-600" title="Aurora"></button>
        <div class="w-px h-6 bg-white/20 mx-2"></div>
        <button onclick="toggleFullscreen()" class="text-white/60 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        </button>
    </div>

    <script>
        function updateTime() {
            // Get time for Asia/Kolkata
            const options = {
                timeZone: 'Asia/Kolkata',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            };
            
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-IN', options);
            
            const dateOptions = {
                timeZone: 'Asia/Kolkata',
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            };
            const dateString = now.toLocaleDateString('en-IN', dateOptions);

            document.getElementById('time').textContent = timeString;
            document.getElementById('date').textContent = dateString;
            
            // Move glow effect subtly
            const glow = document.getElementById('glow');
            const x = Math.sin(now.getSeconds() / 10) * 50;
            const y = Math.cos(now.getSeconds() / 10) * 50;
            glow.style.transform = `translate(${x}px, ${y}px)`;
        }

        function setTheme(theme) {
            const body = document.getElementById('body');
            body.className = theme;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Hide controls after inactivity
        let timeout;
        document.addEventListener('mousemove', () => {
            const controls = document.getElementById('controls');
            const body = document.getElementById('body');
            controls.style.opacity = '1';
            body.classList.remove('cursor-hide');
            
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                controls.style.opacity = '0';
                body.classList.add('cursor-hide');
            }, 3000);
        });

        // Initialize
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
