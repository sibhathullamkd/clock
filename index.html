<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30+ Aesthetic Time Screensavers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&family=JetBrains+Mono:wght@100;400&family=Playfair+Display:ital,wght@0,400;1,700&family=Orbitron:wght@400;900&family=Bebas+Neue&family=Space+Grotesk:wght@300;700&family=Syne:wght@400;800&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #3b82f6;
            --bg: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--primary);
            overflow: hidden;
            transition: background 1.2s ease, color 1.2s ease;
            user-select: none;
        }

        #stage {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            padding: 2rem;
        }

        /* --- Navigation Arrows --- */
        .nav-btn {
            position: fixed; top: 0; height: 100%; width: 80px;
            display: flex; align-items: center; justify-content: center;
            background: transparent; color: white; cursor: pointer;
            z-index: 100; transition: opacity 0.4s; opacity: 0;
            border: none;
        }
        body:hover .nav-btn { opacity: 0.4; }
        .nav-btn:hover { opacity: 1 !important; background: rgba(255,255,255,0.03); }
        .nav-left { left: 0; }
        .nav-right { right: 0; }

        /* --- Developer Credit --- */
        .dev-credit {
            position: fixed; bottom: 1.5rem; left: 1.5rem;
            font-size: 0.65rem; letter-spacing: 0.2em;
            text-transform: uppercase; opacity: 0.3;
            transition: opacity 0.5s; z-index: 102;
        }
        body:hover .dev-credit { opacity: 0.6; }

        /* --- Theme HUD --- */
        .ui-panel {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            z-index: 101; opacity: 0; transition: opacity 0.5s;
        }
        body:hover .ui-panel { opacity: 1; }

        /* --- Orientation Helper --- */
        @media (orientation: portrait) {
            .time-display-main { font-size: 18vw; }
            .analog-face { width: 80vw !important; height: 80vw !important; }
        }

        /* --- Animations --- */
        .fade-in { animation: fadeIn 1s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        canvas#bg-fx { position: absolute; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* Theme Variants */
        .theme-cyber { --bg: #050505; --primary: #00f2ff; }
        .theme-warm { --bg: #0f0a0a; --primary: #ffc480; }
        .theme-forest { --bg: #050a05; --primary: #a8ffb0; }
        .theme-lavender { --bg: #0a050f; --primary: #d8b4fe; }
        .theme-mono-white { --bg: #ffffff; --primary: #000000; }
    </style>
</head>
<body id="app">

    <canvas id="bg-fx"></canvas>

    <div class="dev-credit">Developed by Sibhathulla MKD</div>

    <button class="nav-btn nav-left" onclick="prev()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="nav-btn nav-right" onclick="next()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <div id="stage"></div>

    <div class="ui-panel flex items-center gap-4 bg-black/20 p-2 rounded-lg border border-white/5 backdrop-blur-md">
        <span id="counter" class="text-[10px] font-mono opacity-50 px-2">01 / 30</span>
        <button onclick="toggleFullscreen()" class="p-1 hover:bg-white/10 rounded transition">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
    </div>

    <script>
        const themes = [
            { id: 'neo-minimal', name: 'Neo Minimal', class: '', type: 'digital', font: 'Inter', weight: '100' },
            { id: 'cyber', name: 'Cyber Blue', class: 'theme-cyber', type: 'digital', font: 'Orbitron', weight: '900' },
            { id: 'classic-dark', name: 'Standard IST', class: '', type: 'digital', font: 'Inter', weight: '400' },
            { id: 'serif-italics', name: 'Ethereal', class: 'theme-lavender', type: 'digital', font: 'Cormorant Garamond', weight: '300' },
            { id: 'bauhaus', name: 'Bauhaus', class: 'theme-mono-white', type: 'analog' },
            { id: 'terminal', name: 'Root Terminal', class: 'theme-forest', type: 'terminal' },
            { id: 'big-hours', name: 'Giant Hours', class: 'theme-warm', type: 'giant' },
            { id: 'roman-gold', name: 'Empire', class: 'theme-warm', type: 'analog-roman' },
            { id: 'vertical-stack', name: 'Column', class: 'theme-cyber', type: 'vertical' },
            { id: 'dots', name: 'Matrix Dots', class: 'theme-forest', type: 'dots' },
            { id: 'stencil', name: 'Stencil', class: '', type: 'digital', font: 'Bebas Neue', weight: '400' },
            { id: 'bubble', name: 'Orbit', class: 'theme-lavender', type: 'analog-minimal' },
            { id: 'split', name: 'Split View', class: '', type: 'split' },
            { id: 'future', name: 'Next Gen', class: 'theme-cyber', type: 'digital', font: 'Space Grotesk', weight: '700' },
            { id: 'mono', name: 'Mono Code', class: 'theme-forest', type: 'digital', font: 'JetBrains Mono', weight: '100' },
            { id: 'brutal', name: 'Brutal', class: 'theme-mono-white', type: 'digital', font: 'Syne', weight: '800' },
            { id: 'zen', name: 'Zen Breath', class: '', type: 'pulse' },
            { id: 'sideways', name: 'Rotated', class: 'theme-warm', type: 'rotated' },
            { id: 'blueprint', name: 'Plan', class: 'theme-cyber', type: 'digital', font: 'JetBrains Mono', weight: '400' },
            { id: 'abstract', name: 'Abstract', class: 'theme-lavender', type: 'digital', font: 'Syne', weight: '400' },
            { id: 'ink', name: 'Inkwell', class: 'theme-mono-white', type: 'digital', font: 'Playfair Display', weight: '700' },
            { id: 'tech', name: 'Data Flow', class: 'theme-forest', type: 'digital', font: 'Orbitron', weight: '400' },
            { id: 'ghost', name: 'Ghost', class: '', type: 'ghost' },
            { id: 'v-mono', name: 'V-Mono', class: 'theme-forest', type: 'vertical-mono' },
            { id: 'fancy', name: 'Gilded', class: 'theme-warm', type: 'analog' },
            { id: 'lcd', name: 'LCD', class: 'theme-forest', type: 'digital', font: 'JetBrains Mono', weight: '700' },
            { id: 'space', name: 'Starfield', class: '', type: 'digital', animated: true },
            { id: 'condensed', name: 'Impact', class: '', type: 'digital', font: 'Bebas Neue', weight: '400' },
            { id: 'soft', name: 'Cloud', class: 'theme-lavender', type: 'digital', font: 'Inter', weight: '300' },
            { id: 'heavy', name: 'Heavy', class: 'theme-cyber', type: 'digital', font: 'Syne', weight: '800' }
        ];

        let index = 0;
        const stage = document.getElementById('stage');
        const canvas = document.getElementById('bg-fx');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        }
        window.addEventListener('resize', resize);
        resize();

        function update() {
            const now = new Date();
            const tz = 'Asia/Kolkata';
            const timeStr = now.toLocaleTimeString('en-IN', { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            const dateStr = now.toLocaleDateString('en-IN', { timeZone: tz, weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            const theme = themes[index];
            const elTime = document.getElementById('main-t');
            const elDate = document.getElementById('main-d');

            if (elTime) elTime.textContent = timeStr;
            if (elDate) elDate.textContent = dateStr;

            // Handle unique types
            if (theme.type.includes('analog')) {
                const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
                const rotS = s * 6, rotM = m * 6 + s * 0.1, rotH = h * 30 + m * 0.5;
                const hS = document.getElementById('h-s'), hM = document.getElementById('h-m'), hH = document.getElementById('h-h');
                if (hS) hS.style.transform = `translateX(-50%) rotate(${rotS}deg)`;
                if (hM) hM.style.transform = `translateX(-50%) rotate(${rotM}deg)`;
                if (hH) hH.style.transform = `translateX(-50%) rotate(${rotH}deg)`;
            }
            
            if (theme.type === 'giant') {
                document.getElementById('g-h').textContent = now.getHours().toString().padStart(2, '0');
                document.getElementById('g-m').textContent = now.getMinutes().toString().padStart(2, '0');
            }
        }

        function render() {
            const t = themes[index];
            document.body.className = t.class;
            document.getElementById('counter').textContent = `${(index + 1).toString().padStart(2, '0')} / ${themes.length}`;
            
            let html = `<div class="fade-in text-center w-full">`;
            
            if (t.type.includes('analog')) {
                html += `
                    <div class="analog-face mx-auto relative border-[1px] border-current mb-8" style="width:300px; height:300px; border-radius:50%">
                        <div id="h-h" class="absolute bottom-1/2 left-1/2 w-1.5 h-20 bg-current origin-bottom rounded-full" style="z-index:3"></div>
                        <div id="h-m" class="absolute bottom-1/2 left-1/2 w-1 h-28 bg-current origin-bottom opacity-70 rounded-full" style="z-index:2"></div>
                        <div id="h-s" class="absolute bottom-1/2 left-1/2 w-0.5 h-32 bg-red-500 origin-bottom" style="z-index:1"></div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 bg-current rounded-full"></div>
                    </div>
                    <div id="main-d" class="text-xs uppercase tracking-[0.4em] opacity-40"></div>
                `;
            } else if (t.type === 'giant') {
                html += `
                    <div class="flex flex-col items-center">
                        <span id="g-h" class="text-[35vw] font-black leading-none opacity-10">00</span>
                        <span id="g-m" class="text-[35vw] font-black leading-none -mt-[10vw]">00</span>
                    </div>
                `;
            } else if (t.type === 'terminal') {
                html += `
                    <div class="text-left font-mono text-sm max-w-md mx-auto border-l border-current pl-6">
                        <div class="opacity-40">// Karakurussi, Kerala Portal</div>
                        <div id="main-t" class="text-5xl my-4 font-bold"></div>
                        <div id="main-d" class="opacity-60"></div>
                        <div class="mt-4 animate-pulse">_ EXEC_READY</div>
                    </div>
                `;
            } else if (t.type === 'vertical') {
                html += `
                    <div class="flex flex-col font-bold text-[18vh] leading-[0.9]">
                        <span id="v-h">00</span><span id="v-m">00</span><span id="v-s" class="opacity-20">00</span>
                    </div>
                `;
            } else {
                html += `
                    <div id="main-t" class="time-display-main leading-none mb-4" style="font-family:'${t.font}'; font-weight:${t.weight}">00:00:00</div>
                    <div id="main-d" class="text-sm md:text-lg opacity-40 tracking-[0.3em] uppercase"></div>
                `;
            }

            html += `<div class="mt-12 text-[9px] opacity-20 uppercase tracking-[0.6em]">Karakurussi, Kerala, India</div>`;
            html += `</div>`;
            
            stage.innerHTML = html;
            update();
        }

        function next() { index = (index + 1) % themes.length; render(); }
        function prev() { index = (index - 1 + themes.length) % themes.length; render(); }
        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        // Starfield animation
        let stars = Array(150).fill().map(() => ({ x: Math.random(), y: Math.random(), s: Math.random() }));
        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--primary');
            ctx.globalAlpha = 0.2;
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x * canvas.width, s.y * canvas.height, s.s * 1.5, 0, Math.PI*2);
                ctx.fill();
                s.y -= 0.0002;
                if(s.y < 0) s.y = 1;
            });
            requestAnimationFrame(drawStars);
        }

        setInterval(update, 1000);
        document.addEventListener('keydown', e => { if(e.key==='ArrowRight') next(); if(e.key==='ArrowLeft') prev(); });
        drawStars();
        render();
    </script>
</body>
</html>
